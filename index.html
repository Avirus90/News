<!DOCTYPE html>
<html>
<head>
  <title>OdiGyan Current Affairs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      padding: 15px;
      background: #f5f5f5;
    }
    h2 {
      text-align: center;
    }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .title {
      font-size: 18px;
      font-weight: bold;
    }
    .desc {
      margin: 10px 0;
    }
    .date {
      font-size: 12px;
      color: gray;
    }
    a {
      text-decoration: none;
      color: blue;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2>📚 OdiGyan Current Affairs</h2>
<div id="news">⏳ Loading latest news...</div>

<script>
const API_URL = "https://odigyan-backend.onrender.com/news";

async function loadNews() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    const container = document.getElementById("news");
    container.innerHTML = "";

    if (!data.results || data.results.length === 0) {
      container.innerHTML = "⚠️ No news available";
      return;
    }

    data.results.slice(0, 10).forEach(item => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="title">${item.title}</div>
        <div class="desc">${item.description || "No description available"}</div>
        <div class="date">📅 ${item.pubDate}</div>
        <br>
        <a href="${item.link}" target="_blank">👉 Read Full Article</a>
      `;

      container.appendChild(div);
    });

  } catch (err) {
    document.getElementById("news").innerText = "❌ Failed to load news";
  }
}

loadNews();
</script>

</body>
</html>
